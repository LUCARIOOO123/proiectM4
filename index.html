<!doctype html>
<html lang="ro">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Labirintul cu Oglinzi</title>

<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{font-family:system-ui;background:#fff;overflow:hidden;}

.stage{
  position:relative;
  width:100vw;
  height:100svh;
  overflow:hidden;
  transform-origin:center;
  transition:transform .8s ease;
}

.room{
  position:absolute;
  inset:0;
  opacity:0;
  pointer-events:none;
  transition:opacity .5s ease;
}

.room.visible{
  opacity:1;
  pointer-events:auto;
}

.room-bg{
  width:100%;
  height:100%;
  object-fit:cover;
}

.overlay{
  position:fixed;
  inset:0;
  background:#000;
  opacity:0;
  pointer-events:none;
  transition:opacity .6s ease;
  z-index:50;
}

.overlay.visible{opacity:1;}

.arrow-btn{
  position:absolute;
  border:none;
  background:rgba(0,0,0,.4);
  padding:4px;
  cursor:pointer;
  z-index:10;
  border-radius:999px;
}

.arrow-btn.disabled{
  pointer-events:none;
  opacity:.4;
}

.arrow-img{
  width:64px;
  height:64px;
}

.arrow-center-bottom{left:50%;bottom:5%;transform:translateX(-50%);}
.arrow-center-middle{left:50%;top:50%;transform:translate(-50%,-50%);}
.arrow-left{transform:rotate(180deg);}
.arrow-up{transform:rotate(-90deg);}
.arrow-down{transform:rotate(90deg);}
.arrow-bottom-left{left:6%;bottom:8%;}
.arrow-bottom-right{right:6%;bottom:8%;}

/* PAPER */

.paper-btn{
  position:absolute;
  top:4%;
  right:4%;
  border:none;
  background:none;
  cursor:pointer;
  z-index:200;
}

.paper-img{width:120px;}

.paper-overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.6);
  display:flex;
  justify-content:center;
  align-items:flex-start;
  padding-top:5%;
  opacity:0;
  pointer-events:none;
  transition:opacity .4s ease;
  z-index:150;
}

.paper-overlay.visible{
  opacity:1;
  pointer-events:auto;
}

.paper-layout{
  width:min(700px,90vw);
  transform:translateY(-200px);
  opacity:0;
  transition:transform .5s ease,opacity .5s ease;
}

.paper-overlay.visible .paper-layout{
  transform:translateY(0);
  opacity:1;
}

/* DIALOGUE */

.dialogue{
  position:fixed;
  left:50%;
  bottom:5%;
  transform:translateX(-50%);
  width:min(900px,92vw);
  background:rgba(255,255,255,.96);
  border-radius:16px;
  box-shadow:0 20px 50px rgba(0,0,0,.35);
  padding:14px 16px;
  z-index:300;
  display:none;
}

.dialogue.visible{display:block;}

.choice-btn{
  margin-top:8px;
  padding:6px 10px;
  border-radius:999px;
  border:1px solid #ddd;
  cursor:pointer;
}
</style>
</head>

<body>

<div id="overlay" class="overlay"></div>
<div class="stage" id="stage">

<section id="outside" class="room visible">
<img src="building1.png" class="room-bg"
style="width:50%;height:auto;object-fit:contain;position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);" />
<button id="enterArrow" class="arrow-btn arrow-center-bottom">
<img src="arrow.png" class="arrow-img arrow-up" />
</button>
</section>

<section id="maze1" class="room">
<img src="maze1.png" class="room-bg" />
<button id="maze1Left" class="arrow-btn arrow-bottom-left">
<img src="arrow.png" class="arrow-img arrow-left" />
</button>
<button id="maze1Right" class="arrow-btn arrow-bottom-right">
<img src="arrow.png" class="arrow-img" />
</button>
</section>

<section id="candy" class="room">
<img id="candyImage" src="candy.jpg" class="room-bg"
style="width:80%;height:auto;object-fit:contain;position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);" />
<button id="candyBack" class="arrow-btn arrow-bottom-left">
<img src="arrow.png" class="arrow-img arrow-left" />
</button>
<button id="candyForward" class="arrow-btn arrow-bottom-right">
<img src="arrow.png" class="arrow-img" />
</button>
</section>

<section id="clothing" class="room">
<img src="clothing.jpg" class="room-bg" />
<button id="clothingBack" class="arrow-btn arrow-bottom-left">
<img src="arrow.png" class="arrow-img arrow-left" />
</button>

<button id="paperBtn" class="paper-btn">
<img src="paper.png" class="paper-img" />
</button>

<div id="paperOverlay" class="paper-overlay">
<img src="clothingstorelayout.png" class="paper-layout" />
</div>
</section>

</div>

<!-- DIALOGUE -->
<div id="dialogue" class="dialogue">
<div id="dialogueText">Text aici</div>
<button class="choice-btn" data-choice="1">Ce-i cu locul asta?</button>
<button class="choice-btn" data-choice="2">Tu cine esti?</button>
<button class="choice-btn" data-choice="3">Pot sa cumpar niste dulciuri?</button>
</div>

<script>

/* ===== BGMUSIC ===== */
const BGmusic=new Audio("BG.mp3");
BGmusic.loop=true;
BGmusic.volume=.35;

document.getElementById("enterArrow").addEventListener("pointerdown",()=>{
BGmusic.play().catch(()=>{});
});

/* ===== DIALOGUE ===== */
/* ===== DIALOGUE FIXED PROPERLY ===== */

const candyImage = document.getElementById("candyImage");
const dialogue = document.getElementById("dialogue");
const dialogueText = document.getElementById("dialogueText");

const introLine = "Yooo ce faci nasuleee! Bun venit la Abztract, cu ce te pot ajuta?";
const choiceLine1 = "Locul acesta este sectiunea de dulciuri! Mai ai inca 2 sectiuni de vizitat!";
const choiceLine2 = "Eu sunt Nasu' suprem, detin aceasta parte al magazinului Abztract!";
const choiceLine3 = "Dar cum sa nu! Asigura-te ca nu au otrava! Haha!";

const voiceIntro = new Audio("intro.mp3");
const voice1 = new Audio("choice1.mp3");
const voice2 = new Audio("choice2.mp3");
const voice3 = new Audio("choice3.mp3");

function stopVoices(){
  [voiceIntro,voice1,voice2,voice3].forEach(a=>{
    a.pause();
    a.currentTime = 0;
  });
}

function openDialogue(){
  dialogue.classList.add("visible");
  dialogueText.textContent = introLine;
  stopVoices();
  voiceIntro.play().catch(()=>{});
}

/* 🔥 THIS IS THE IMPORTANT PART */
candyImage.addEventListener("click",(e)=>{
  e.stopPropagation();
  openDialogue();
});

/* choices */

document.querySelectorAll(".choice-btn").forEach(btn=>{
  btn.addEventListener("click",(e)=>{
    e.stopPropagation();
    stopVoices();

    if(btn.dataset.choice==="1"){
      dialogueText.textContent = choiceLine1;
      voice1.play().catch(()=>{});
    }

    if(btn.dataset.choice==="2"){
      dialogueText.textContent = choiceLine2;
      voice2.play().catch(()=>{});
    }

    if(btn.dataset.choice==="3"){
      dialogueText.textContent = choiceLine3;
      voice3.play().catch(()=>{});
    }
  });
});

/* ===== PAPER ===== */
/* ===== FIXED PAPER SYSTEM ===== */

const paperBtn = document.getElementById("paperBtn");
const paperOverlay = document.getElementById("paperOverlay");
const clothingSection = document.getElementById("clothing");
const clothingArrows = clothingSection.querySelectorAll(".arrow-btn");

const paperSound = new Audio("papersound.mp3");
paperSound.volume = 0.8;

let paperOpen = false;

/* ===== ROOM NAV ===== */
const rooms = document.querySelectorAll(".room");
function showRoom(id){
  rooms.forEach(r=>{
    const active = r.id === id;
    r.classList.toggle("visible", active);
    r.style.display = active ? "block" : "none";
  });
  if(id !== "clothing"){
    paperOpen = false;
    paperOverlay.classList.remove("visible");
    clothingArrows.forEach(btn=>{
      btn.style.pointerEvents = "auto";
      btn.style.opacity = "1";
    });
  }
}

document.getElementById("enterArrow").addEventListener("click",()=>showRoom("maze1"));
document.getElementById("maze1Left").addEventListener("click",()=>showRoom("candy"));
document.getElementById("maze1Right").addEventListener("click",()=>showRoom("clothing"));
document.getElementById("candyBack").addEventListener("click",()=>showRoom("maze1"));
document.getElementById("candyForward").addEventListener("click",()=>showRoom("clothing"));
document.getElementById("clothingBack").addEventListener("click",()=>showRoom("maze1"));

/* ensure initial visibility is consistent */
showRoom("outside");

paperBtn.addEventListener("click", (e) => {
  e.stopPropagation();
  paperOpen = !paperOpen;

  paperSound.currentTime = 0;
  paperSound.play().catch(()=>{});

  if (paperOpen) {
    paperOverlay.classList.add("visible");

    /* disable ONLY clothing arrows */
    clothingArrows.forEach(btn => {
      btn.style.pointerEvents = "none";
      btn.style.opacity = "0.4";
    });

  } else {
    paperOverlay.classList.remove("visible");

    clothingArrows.forEach(btn => {
      btn.style.pointerEvents = "auto";
      btn.style.opacity = "1";
    });
  }
});

/* prevent overlay click from closing */
paperOverlay.addEventListener("click", (e) => {
  e.stopPropagation();
});

</script>

</body>
</html>
